<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi página web en internet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #0f5c5c 0%, #1d7272 55%, #1e6f70 100%);
      color: white;
    }

    .hero {
      text-align: center;
      padding: 70px 20px 40px;
    }

    .hero h1 {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 1.2rem;
    }

    .cards {
      max-width: 1100px;
      margin: 10px auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 0 20px 60px;
    }

    .card {
      background: #ececec;
      color: #111;
      border-radius: 18px;
      padding: 26px 24px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 14px;
    }

    .card p {
      font-size: 0.95rem;
      line-height: 1.5;
      min-height: 48px;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      background: #1f232b;
      color: white;
      text-decoration: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #11151b;
      transform: translateY(-2px);
    }

    @media (max-width: 900px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .hero h1 { font-size: 2.8rem; }
    }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
      .hero h1 { font-size: 2.2rem; }
      .hero p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Mi página web en internet</h1>
    <p>Esta es mi primera página web subida a un hosting</p>
  </section>

  <section class="cards">
    <div class="card">
      <h2>Currículum</h2>
      <p>Conoce mi perfil profesional</p>
      <a href="cv.html" class="btn">Entrar</a>
      <link rel="stylesheet" href="css.css">
    </div>

    <div class="card">
      <h2>Tabla</h2>
      <p>Ejemplo de tabla en HTML</p>
      <a href="activiti 2.html" class="btn">Entrar</a>
      <link rel="stylesheet" href="css.css">
    </div>

    <div class="card">
      <h2>Tarjetas</h2>
      <p>Diseño de cards en HTML</p>
      <a href="actividad 3.html" class="btn">Entrar</a>
   <link rel="stylesheet" href="css.css">
    </div>

    <div class="card">
      <h2>Formulario</h2>
      <p>Práctica formulario HTML</p>
      <a href="frood.html" class="btn">Entrar</a>
      <link rel="stylesheet" href="css.css">
    </div>
  </section>
</body>
</html>
