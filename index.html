<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi página web</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial;
      background: linear-gradient(180deg, #0f5c5c, #1e6f70);
      color: white;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 3rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #eee;
      color: black;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .btn {
      display: block;
      margin-top: 15px;
      background: black;
      color: white;
      padding: 10px;
      text-decoration: none;
      border-radius: 8px;
    }

    .btn:hover {
      background: #333;
    }

    @media(max-width:800px){
      .cards{grid-template-columns:1fr 1fr;}
    }

    @media(max-width:500px){
      .cards{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Mi página web en internet</h1>
    <p>Esta es mi primera página web</p>
  </div>

  <div class="cards">

    <div class="card">
      <h2>Currículum</h2>
      <p>Perfil profesional</p>
      <a href="cv.html" class="btn">Entrar</a>
    </div>

    <div class="card">
      <h2>Tabla</h2>
      <p>Ejemplo tabla</p>
      <a href="activiti2.html" class="btn">Entrar</a>
    </div>

    <div class="card">
      <h2>Tarjetas</h2>
      <p>Diseño cards</p>
      <a href="actividad3.html" class="btn">Entrar</a>
    </div>

    <div class="card">
      <h2>Formulario</h2>
      <p>Formulario HTML</p>
      <a href="frood.html" class="btn">Entrar</a>
    </div>

  </div>

</body>
</html>
